services:
  api:
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - fraudops-data:/app/data
  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.address=0.0.0.0
    ports:
      - "8501:8501"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - fraudops-data:/app/data

volumes:
  fraudops-data:
